services:
  app-prod:
    build:
      context: .
      target: production
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "1000:1000"
    env_file:
      - .env
    volumes:
      - .:/app:ro
      - ./uploads:/app/uploads:rw
      - ./temp:/app/temp:rw
    #      - /app/.venv/
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - app-network-structure-IA
    environment:
      - UPLOAD_FOLDER=/app/uploads
      - TEMP_FOLDER=/app/temp
      - ENVIRONMENT=production
    command: >
      bash -c "
        mkdir -p /app/uploads /app/temp &&
        uvicorn app.main:app --host 0.0.0.0 --port 1000 
      "
    restart: unless-stopped
    profiles:
      - prod
      - production
  app-dev:
    build:
      context: .
      target: development
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "9922:9922"
    env_file:
      - .env
    volumes:
      - .:/app:ro
      - ./uploads:/app/uploads:rw
      - ./temp:/app/temp:rw
    #      - /app/.venv/
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - app-network-structure-IA
    environment:
      - UPLOAD_FOLDER=/app/uploads
      - TEMP_FOLDER=/app/temp
      - ENVIRONMENT=development
    command: >
      bash -c "
        mkdir -p /app/uploads /app/temp &&
        uvicorn app.main:app --host 0.0.0.0 --port 9922
      "
    profiles:
      - dev
      - development
networks:
  app-network-structure-IA:
    driver: bridge
    name: app-network-structure-IA
